site_name: 安全扫描工具文档
site_description: Vigolium 与 Osmedeus 中文文档
site_url: https://docs.rain99.xyz
repo_url: https://github.com/rain99-xyz/docs-translation
repo_name: rain99-xyz/docs-translation
edit_uri: ""

theme:
  name: material
  language: zh
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到暗色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到亮色模式

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/rain99-xyz/docs-translation

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - admonition
  - toc:
      permalink: true
      title: 目录
  - attr_list
  - md_in_html

plugins:
  - search:
      lang: zh

nav:
  - 首页: index.md

